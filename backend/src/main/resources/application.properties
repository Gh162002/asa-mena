spring.application.name=asa-mena-backend

# Port : Render injecte PORT automatiquement
server.port=${PORT:8080}

# ─── Base de données ───────────────────────────────────────────────────────────
# En local : H2 in-memory
# En production (Render) : DATABASE_URL est injectée automatiquement par Render
# Format Render : postgres://user:password@host:port/dbname
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:asamena}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Détection automatique H2 vs PostgreSQL selon la variable DATABASE_URL
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create-drop}
spring.jpa.show-sql=false

# H2 Console (dev uniquement)
spring.h2.console.enabled=${H2_CONSOLE:true}

# ─── Mail (Gmail de l'organisation) ───────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:fsalliancemena@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Email de destination pour les messages de contact
app.contact.email=${CONTACT_EMAIL:fsalliancemena@gmail.com}

# ─── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
