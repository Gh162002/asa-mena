# ─── Profil PRODUCTION (Render) ───────────────────────────────────────────────
# Render fournit DATABASE_URL au format : postgres://user:pass@host:port/dbname
# Spring Boot attend le format : jdbc:postgresql://...
# On utilise un trick : Render injecte aussi JDBC_DATABASE_URL au format JDBC

spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console désactivée en production
spring.h2.console.enabled=false

# Logs
logging.level.com.asamena=INFO
